name: Test and Coverage

on:
  push:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "tests/**"
  pull_request:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "tests/**"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COVERAGE_THRESHOLD: 75

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      coverage_percent: ${{ steps.coverage.outputs.percent }}
      coverage_passed: ${{ steps.coverage.outputs.passed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        id: coverage
        run: |
          cargo llvm-cov --lib --no-report --ignore-filename-regex "noisy\.rs|lib\.rs"
          cargo llvm-cov report --json --output-path coverage.json --ignore-filename-regex "noisy\.rs|lib\.rs"
          cargo llvm-cov report --html --output-dir coverage-html --ignore-filename-regex "noisy\.rs|lib\.rs"
          cargo llvm-cov report --ignore-filename-regex "noisy\.rs|lib\.rs" > coverage-summary.txt

          PERCENT=$(jq '.data[0].totals.lines.percent // 0' coverage.json | xargs printf "%.1f")
          echo "percent=$PERCENT" >> "$GITHUB_OUTPUT"

          if python -c "import sys; sys.exit(0 if float('$PERCENT') >= float('$COVERAGE_THRESHOLD') else 1)"; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "Coverage: ${PERCENT}% (threshold: ${COVERAGE_THRESHOLD}%)"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "Coverage below threshold: ${PERCENT}% (threshold: ${COVERAGE_THRESHOLD}%)"
          fi
          echo "$PERCENT" > coverage-percent.txt

      - name: Upload coverage HTML report
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 14

      - name: Upload coverage summary
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: |
            coverage.json
            coverage-summary.txt
            coverage-percent.txt

      - name: Get base branch coverage (for PR)
        if: github.event_name == 'pull_request'
        id: base_coverage
        continue-on-error: true
        run: |
          git fetch origin ${{ github.base_ref }}:base_branch
          git worktree add base_worktree base_branch

          cd base_worktree
          cargo llvm-cov --lib --json --output-path ../base-coverage.json --ignore-filename-regex "noisy\.rs|lib\.rs" 2>/dev/null || echo '{"data":[{"totals":{"lines":{"percent":0}}}]}' > ../base-coverage.json

          cd ..
          BASE_PERCENT=$(jq '.data[0].totals.lines.percent // 0' base-coverage.json | xargs printf "%.1f")
          echo "percent=$BASE_PERCENT" >> "$GITHUB_OUTPUT"

          git worktree remove base_worktree --force 2>/dev/null || true

      - name: Write coverage to step summary
        run: |
          PERCENT=$(cat coverage-percent.txt)
          THRESHOLD=$COVERAGE_THRESHOLD
          BASE_PERCENT="${{ steps.base_coverage.outputs.percent }}"

          if python -c "import sys; sys.exit(0 if float('$PERCENT') >= float('$THRESHOLD') else 1)"; then
            STATUS="Passing"
          else
            STATUS="Below threshold"
          fi

          echo "## Code Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage | ${PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$BASE_PERCENT" ]; then
            echo "| Base Coverage | ${BASE_PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| Threshold | ${THRESHOLD}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Detailed Report</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if coverage below threshold
        run: |
          PERCENT=$(cat coverage-percent.txt)
          THRESHOLD=$COVERAGE_THRESHOLD

          if python -c "import sys; sys.exit(0 if float('$PERCENT') < float('$THRESHOLD') else 1)"; then
            echo "Coverage ${PERCENT}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${PERCENT}% meets threshold ${THRESHOLD}%"

  sprt-ci:
    needs: test-and-coverage
    if: needs.test-and-coverage.outputs.coverage_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check for previous commit
        id: check_parent
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1
            echo "has_parent=true" >> "$GITHUB_OUTPUT"
            echo "old_commit=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_OUTPUT"
          elif ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "No previous commit detected; skipping SPRT comparison."
            echo "has_parent=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_parent=true" >> "$GITHUB_OUTPUT"
            echo "old_commit=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build OLD SPRT binary from previous commit
        if: steps.check_parent.outputs.has_parent == 'true'
        run: |
          set -e
          OLD_COMMIT="${{ steps.check_parent.outputs.old_commit }}"
          OLD_WORKTREE="$(mktemp -d)"

          git worktree add "$OLD_WORKTREE" "$OLD_COMMIT"
          cargo build --release --features sprt --bin sprt --manifest-path "$OLD_WORKTREE/Cargo.toml"
          mkdir -p "$GITHUB_WORKSPACE/target/release"
          cp "$OLD_WORKTREE/target/release/sprt" "$GITHUB_WORKSPACE/target/release/sprt_old"
          git worktree remove "$OLD_WORKTREE" --force

      - name: Run SPRT CLI (HEAD vs previous)
        if: steps.check_parent.outputs.has_parent == 'true'
        env:
          SPRT_CI_GAMES: "250"
          SPRT_CI_MIN_GAMES: "250"
          SPRT_CI_CONCURRENCY: "10"
          SPRT_CI_TC: "5+0.05"
        run: |
          set -o pipefail
          mkdir -p sprt
          cargo run --release --features sprt --bin sprt -- run \
            --old-bin target/release/sprt_old \
            --tc "$SPRT_CI_TC" \
            --concurrency "$SPRT_CI_CONCURRENCY" \
            --games "$SPRT_CI_GAMES" \
            --min-games "$SPRT_CI_MIN_GAMES" \
            --max-moves 200 \
            --results sprt/raw_results.json \
            --json sprt/game_logs.json \
            2>&1 | tee sprt/sprt-ci.log

      - name: Write skipped SPRT result
        if: steps.check_parent.outputs.has_parent != 'true'
        run: |
          cat <<'EOF' > sprt/ci_result.json
          {
            "games": 0,
            "wins": 0,
            "losses": 0,
            "draws": 0,
            "elo": 0,
            "eloError": 0,
            "llr": 0,
            "verdict": "SKIPPED",
            "logSummary": "No previous commit detected; SPRT comparison skipped."
          }
          EOF

      - name: Package SPRT CI result
        if: steps.check_parent.outputs.has_parent == 'true'
        run: |
          python - <<'PY'
          import json
          import math
          from pathlib import Path

          raw_path = Path("sprt/raw_results.json")
          log_path = Path("sprt/sprt-ci.log")
          out_path = Path("sprt/ci_result.json")

          raw = json.loads(raw_path.read_text()) if raw_path.exists() else {}
          log_lines = log_path.read_text(encoding="utf-8", errors="replace").splitlines() if log_path.exists() else []

          alpha = 0.05
          beta = 0.05
          min_games = 250
          llr = float(raw.get("llr", 0))
          total_games = int(raw.get("total_games", 0))
          lower = math.log(beta / (1 - alpha))
          upper = math.log((1 - beta) / alpha)

          if total_games >= min_games and llr >= upper:
              verdict = "PASS"
          elif total_games >= min_games and llr <= lower:
              verdict = "FAIL"
          else:
              verdict = "INCONCLUSIVE"

          result = {
              "games": total_games,
              "wins": int(raw.get("wins", 0)),
              "losses": int(raw.get("losses", 0)),
              "draws": int(raw.get("draws", 0)),
              "elo": raw.get("elo", 0),
              "eloError": raw.get("elo_error", 0),
              "llr": llr,
              "verdict": verdict,
              "logSummary": "\n".join([line for line in log_lines if line.strip()][-20:]),
          }

          out_path.write_text(json.dumps(result, indent=2) + "\n")
          PY

      - name: Upload SPRT CI result artifact
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: sprt-ci-result
          path: |
            sprt/ci_result.json
            sprt/raw_results.json
            sprt/sprt-ci.log
            sprt/game_logs.json
          if-no-files-found: ignore

      - name: Write SPRT summary to check
        if: always()
        run: |
          if [ ! -f sprt/ci_result.json ]; then
            echo "No SPRT CI result found" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const resultPath = path.join(process.cwd(), 'sprt', 'ci_result.json');
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          if (!fs.existsSync(resultPath) || !summaryPath) {
            process.exit(0);
          }
          const data = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
          const lines = [];
          lines.push('### SPRT CI (HEAD vs previous commit)');
          lines.push('');
          if (data.verdict) {
            lines.push(`Verdict: **${data.verdict}**`);
            lines.push('');
          }
          if (typeof data.elo === 'number' && data.games > 0) {
            const elo = data.elo;
            const err = typeof data.eloError === 'number' ? data.eloError : 0;
            const lower = elo - err;
            const upper = elo + err;
            let heuristic = 'roughly equal';
            if (lower > 50) {
              heuristic = 'probably better';
            } else if (lower > 0) {
              heuristic = 'slightly better';
            } else if (upper < -50) {
              heuristic = 'probably worse';
            } else if (upper < 0) {
              heuristic = 'slightly worse';
            }
            lines.push(`Heuristic verdict (short run): **${heuristic}**`);
            lines.push('');
          }
          lines.push(`Games: ${data.games}  (W:${data.wins} L:${data.losses} D:${data.draws})`);
          if (typeof data.elo === 'number' && data.games > 0) {
            const eloStr = data.elo >= 0 ? `+${data.elo.toFixed(1)}` : data.elo.toFixed(1);
            const errStr = typeof data.eloError === 'number' ? data.eloError.toFixed(1) : 'n/a';
            lines.push(`Estimated Elo: ${eloStr} +/- ${errStr}`);
          }
          if (typeof data.llr === 'number') {
            lines.push(`LLR: ${data.llr.toFixed(2)}`);
          }
          lines.push('');
          if (data.logSummary) {
            lines.push('```text');
            lines.push(data.logSummary);
            lines.push('```');
          }
          fs.appendFileSync(summaryPath, lines.join('\n') + '\n');
          EOF
